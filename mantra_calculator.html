<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🫖 Сантария | Чайник-калькулятор</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🫖</text></svg>">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#fdf6ed,#f0e6d8);min-height:100vh;padding:20px;display:flex;justify-content:center;align-items:flex-start}
        .container{max-width:950px;width:100%;background:#fffdf9;border-radius:32px;padding:32px;box-shadow:0 20px 60px rgba(120,80,40,0.15);margin-top:20px;border:1px solid #f0e4d4}
        .header{display:flex;align-items:center;gap:14px;margin-bottom:4px}
        .header .kettle{font-size:44px;line-height:1}
        .header h1{font-size:30px;color:#5a3e2b;font-weight:800;letter-spacing:-0.5px}
        .header h1 span{color:#b8863a}
        .subtitle{color:#8b7355;font-size:15px;margin-bottom:22px;padding-bottom:16px;border-bottom:2px dashed #e8dccc;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
        .subtitle .emoji{font-size:20px}
        
        .input-row{display:flex;gap:12px;flex-wrap:wrap;align-items:stretch}
        .input-row textarea{flex:1;min-width:200px;height:60px;padding:14px 18px;font-size:20px;border:2px solid #e8dccc;border-radius:18px;font-family:inherit;resize:vertical;transition:.3s;background:#fdfaf6}
        .input-row textarea:focus{border-color:#b8863a;outline:none;box-shadow:0 0 0 4px rgba(184,134,58,0.1);background:#fffcf8}
        .input-row textarea::placeholder{color:#bba28c}
        
        .btn-group{display:flex;gap:10px;flex-wrap:wrap}
        .btn-group button{padding:14px 20px;border:none;border-radius:40px;font-size:16px;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap}
        .btn-calc{background:#b8863a;color:#fff;box-shadow:0 4px 15px rgba(184,134,58,0.3)}
        .btn-calc:hover{background:#9e6f2e;transform:scale(1.02)}
        .btn-clear{background:#e8dccc;color:#5a3e2b}
        .btn-clear:hover{background:#dccfc0}
        .btn-decode{background:#6b8a6b;color:#fff;box-shadow:0 4px 15px rgba(80,120,80,0.3)}
        .btn-decode:hover{background:#4a6a4a;transform:scale(1.02)}
        .btn-history{background:#8a7a6a;color:#fff;box-shadow:0 4px 15px rgba(120,100,80,0.3)}
        .btn-history:hover{background:#6a5a4a;transform:scale(1.02)}
        .btn-history.active{background:#b8863a}
        
        .error{color:#b34a3a;font-size:14px;padding:8px 16px;background:#fde8e0;border-radius:30px;display:none;margin-top:8px}
        .error.show{display:inline-block}
        .info-row{display:flex;justify-content:space-between;font-size:13px;color:#8b7355;margin:10px 0 4px;flex-wrap:wrap;gap:6px}
        .badge{background:#f5ede4;padding:3px 16px;border-radius:30px}
        .table-ref{margin-top:16px;padding:14px 16px;background:#fdfaf6;border-radius:14px;border:1px solid #e8dccc;font-size:13px;line-height:1.8}
        .table-ref strong{color:#5a3e2b}
        .table-ref .num{color:#b8863a;font-weight:700}
        .table-ref .note{color:#a0806a;font-size:12px;font-style:italic}
        .footer{margin-top:20px;text-align:center;font-size:13px;color:#a0806a;border-top:1px solid #e8dccc;padding-top:16px}
        .share-buttons{margin:12px 0 6px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
        .share-btn{padding:8px 18px;border-radius:30px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:.2s;color:#fff;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
        .share-btn:hover{transform:scale(1.05);opacity:0.9}
        .share-telegram{background:#0088cc}
        .share-whatsapp{background:#25d366}
        .share-vk{background:#0077ff}
        .share-copy{background:#8b7355}

        .results-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px}
        @media(max-width:700px){.results-grid{grid-template-columns:1fr}}
        
        .result-card{background:#fcf6ee;border-radius:20px;padding:18px 20px;border:1px solid #e8dccc;overflow:hidden}
        .result-card .card-title{font-size:13px;color:#8b7355;letter-spacing:0.5px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
        .result-card .card-number{font-size:48px;font-weight:800;color:#4a3222;line-height:1.1}
        .result-card .card-sum{font-size:14px;color:#5a3e2b;background:#fffcf8;padding:4px 14px;border-radius:30px;display:inline-block;margin-top:4px;border:1px solid #e8dccc;font-family:'Courier New',monospace;word-break:break-all}
        
        .result-card.mantra{border-color:#b8863a;background:#fcf6ee}
        .result-card.mantra .card-title{color:#8b7355}
        .result-card.mantra .card-number{color:#5a3e2b}
        .result-card.mantra .sound-row{font-size:18px;font-weight:700;color:#b8863a;word-break:break-all;margin:6px 0 4px;padding:10px 14px;background:#fffcf8;border-radius:10px;border:1px solid #e8dccc;line-height:1.6}
        .result-card.mantra .digit-row{font-size:14px;font-family:'Courier New',monospace;color:#5a3e2b;word-break:break-all;margin:4px 0;padding:6px 12px;background:#f8f4ee;border-radius:8px;border:1px dashed #e0d0c0}
        
        .result-card.code{border-color:#6b8a6b;background:#f6faf6}
        .result-card.code .card-title{color:#5a7a5a}
        .result-card.code .card-number{color:#2a5a2a}
        .result-card.code .code-display{font-size:22px;font-weight:700;color:#2a5a2a;word-break:break-all;margin:4px 0;padding:8px 14px;background:#eef5ee;border-radius:10px;border:1px solid #c8dcc8;font-family:'Courier New',monospace;letter-spacing:1px}

        .result-card.ninecode{border-color:#8a6a8a;background:#f6eef6}
        .result-card.ninecode .card-title{color:#6a4a6a}
        .result-card.ninecode .card-number{color:#4a2a4a}
        .result-card.ninecode .code-steps{font-size:13px;font-family:'Courier New',monospace;color:#5a3e5a;word-break:break-all;margin:4px 0;padding:6px 12px;background:#f4eef4;border-radius:8px;border:1px dashed #d0c0d0;line-height:1.8}
        .result-card.ninecode .code-steps .highlight{color:#b8863a;font-weight:700}
        .result-card.ninecode .code-steps .arrow{color:#a0806a}

        .letters-info{background:#fcf3e8;border-radius:12px;padding:10px 16px;margin-top:8px;border:1px solid #e8dccc;font-size:14px;text-align:left}
        .letters-info .vowel{color:#b34a3a;font-weight:700}
        .letters-info .consonant{color:#2a3a6a;font-weight:700}
        .letters-info .label{color:#8b7355;font-size:13px}

        .history-panel{display:none;margin-top:12px;padding:16px 18px;background:#f8f4ee;border-radius:16px;border:1px solid #e8dccc;max-height:350px;overflow-y:auto}
        .history-panel.open{display:block}
        .history-panel .history-title{font-size:14px;font-weight:600;color:#5a3e2b;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
        .history-panel .history-title .count{font-weight:400;color:#a0806a;font-size:13px}
        .history-item{display:grid;grid-template-columns:auto 1fr auto;gap:10px;padding:6px 10px;border-bottom:1px dashed #e8dccc;font-size:13px;align-items:center}
        .history-item:last-child{border-bottom:none}
        .history-item .h-number{font-weight:700;color:#b8863a;min-width:30px}
        .history-item .h-code{font-family:'Courier New',monospace;color:#5a3e2b;word-break:break-all}
        .history-item .h-result{font-weight:700;color:#5a3e2b;background:#fcf6ee;padding:0 12px;border-radius:20px;border:1px solid #e8dccc;white-space:nowrap}
        .history-item .h-time{color:#a0806a;font-size:11px;white-space:nowrap}
        .history-empty{color:#a0806a;text-align:center;padding:16px;font-style:italic}
        .btn-clear-history{background:transparent;border:none;color:#b34a3a;cursor:pointer;font-size:13px;text-decoration:underline;padding:2px 8px}
        .btn-clear-history:hover{color:#8a2a2a}

        @media(max-width:480px){.container{padding:18px}.result-card .card-number{font-size:36px}.header h1{font-size:24px}}
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="kettle">🫖</div>
        <h1>Сантария <span>| Чайник-калькулятор</span></h1>
    </div>
    <div class="subtitle">
        <span class="emoji">📖</span> Код → звуки → 9-значный код → цифра
        <span style="margin-left:auto;font-size:13px;color:#bba28c;">☕ для чайников</span>
    </div>
    
    <div class="input-row">
        <textarea id="inputText" placeholder="Введите код, слово или фразу...&#10;Например: 369108358 или ирина ивановна ерёменко">ирина ивановна ерёменко</textarea>
        <div class="btn-group">
            <button class="btn-calc" onclick="calculate()">🧮 Заварить!</button>
            <button class="btn-decode" onclick="decodeCode()">🔀 Код → звуки</button>
            <button class="btn-clear" onclick="clearAll()">✕ Очистить</button>
        </div>
    </div>
    
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;">
        <button class="btn-history" id="historyToggle" onclick="toggleHistory()">📜 История (<span id="historyCount">0</span>)</button>
    </div>
    
    <div class="history-panel" id="historyPanel">
        <div class="history-title">
            <span>📜 История расчётов</span>
            <span class="count"><button class="btn-clear-history" onclick="clearHistory()">🗑️ Очистить историю</button></span>
        </div>
        <div id="historyList"></div>
    </div>
    
    <div id="resultsContainer"></div>
    
    <div class="error" id="errorMessage"></div>
    
    <div class="info-row">
        <span class="badge" id="letterCount">Символов: 0</span>
        <span class="badge" id="reductionInfo">Свёрнуто: —</span>
        <span class="badge">🫖 Сантария</span>
    </div>
    
    <div class="table-ref" id="tableRef">
        <strong>📖 Соответствие букв и чисел (мантры):</strong>
        <div id="tableContent"></div>
        <div class="note">* Ь — гласная, Ъ — согласная</div>
    </div>
    
    <div class="share-buttons" id="shareButtons" style="display:none;">
        <button class="share-btn share-telegram" onclick="shareTelegram()">📱 Telegram</button>
        <button class="share-btn share-whatsapp" onclick="shareWhatsApp()">💬 WhatsApp</button>
        <button class="share-btn share-vk" onclick="shareVK()">🌐 ВКонтакте</button>
        <button class="share-btn share-copy" onclick="copyLink()">📋 Копировать ссылку</button>
    </div>
    
    <div class="footer">
        ☕ Всё просто: код → звуки → 9-значный код → цифра (1-9)
        <br>
        <span style="font-size:12px; color:#a0806a;">✨ Сантария ✨</span>
    </div>
</div>

<script>
    // ============================================
    // СЛОВАРИ
    // ============================================
    
    const MANTRA_MAP = {
        'а':1,'и':1,'с':1,'ъ':1,
        'б':2,'й':2,'т':2,'ы':2,
        'в':3,'к':3,'у':3,'ь':3,
        'г':4,'л':4,'ф':4,'э':4,
        'д':5,'м':5,'х':5,'ю':5,
        'е':6,'н':6,'ц':6,'я':6,
        'ё':7,'о':7,'ч':7,
        'ж':8,'п':8,'ш':8,
        'з':9,'р':9,'щ':9
    };
    
    const MANTRA_DECODE_ALL = {
        '1': 'аисъ',
        '2': 'бйты',
        '3': 'вкуь',
        '4': 'глфэ',
        '5': 'дмхю',
        '6': 'енця',
        '7': 'ёоч',
        '8': 'жпш',
        '9': 'зрщ',
        '0': ''
    };
    
    const VOWELS = ['а', 'и', 'у', 'э', 'о', 'ы', 'е', 'ё', 'ю', 'я', 'ь'];
    
    const TABLES = {
        mantra: [
            '1: а, и, с, ъ',
            '2: б, й, т, ы',
            '3: в, к, у, ь',
            '4: г, л, ф, э',
            '5: д, м, х, ю',
            '6: е, н, ц, я',
            '7: ё, о, ч',
            '8: ж, п, ш',
            '9: з, р, щ'
        ]
    };
    
    // ============================================
    // ИСТОРИЯ
    // ============================================
    
    let history = [];
    let historyOpen = false;
    
    function loadHistory() {
        try {
            const saved = localStorage.getItem('chaynik_history');
            if (saved) {
                history = JSON.parse(saved);
            }
        } catch(e) { history = []; }
        updateHistoryUI();
    }
    
    function saveHistory() {
        try {
            localStorage.setItem('chaynik_history', JSON.stringify(history));
        } catch(e) {}
        updateHistoryUI();
    }
    
    function addHistoryEntry(input, result, mantra, codeResult, nineCode, timestamp) {
        const entry = {
            input: input,
            result: result,
            mantra: mantra || '',
            codeResult: codeResult || '',
            nineCode: nineCode || '',
            timestamp: timestamp || new Date().toLocaleString('ru-RU')
        };
        history.unshift(entry);
        if (history.length > 50) history.pop();
        saveHistory();
    }
    
    function updateHistoryUI() {
        const list = document.getElementById('historyList');
        const count = document.getElementById('historyCount');
        count.textContent = history.length;
        
        if (history.length === 0) {
            list.innerHTML = '<div class="history-empty">История пуста</div>';
            return;
        }
        
        let html = '';
        history.forEach((item, index) => {
            const num = history.length - index;
            let displayCode = item.input.length > 40 ? item.input.slice(0, 37) + '...' : item.input;
            let displayResult = item.result;
            if (item.nineCode) displayResult += ' | 9к: ' + item.nineCode;
            html += `
                <div class="history-item">
                    <span class="h-number">#${num}</span>
                    <span class="h-code" title="${item.input}">${displayCode}</span>
                    <span class="h-result">${displayResult}</span>
                    <span class="h-time">${item.timestamp}</span>
                </div>
            `;
        });
        list.innerHTML = html;
        
        if (historyOpen) {
            document.getElementById('historyPanel').classList.add('open');
        }
    }
    
    function toggleHistory() {
        historyOpen = !historyOpen;
        const panel = document.getElementById('historyPanel');
        const btn = document.getElementById('historyToggle');
        if (historyOpen) {
            panel.classList.add('open');
            btn.classList.add('active');
        } else {
            panel.classList.remove('open');
            btn.classList.remove('active');
        }
    }
    
    function clearHistory() {
        if (confirm('🗑️ Очистить всю историю расчётов?')) {
            history = [];
            saveHistory();
            updateHistoryUI();
        }
    }
    
    // ============================================
    // ФУНКЦИИ
    // ============================================
    
    function updateTable() {
        const container = document.getElementById('tableContent');
        container.innerHTML = TABLES.mantra.map(row => `<div>${row}</div>`).join('');
    }
    
    function reduceToSingleDigit(num) {
        if (num === 0) return { final: 0, steps: [0] };
        let result = num;
        const steps = [num];
        while (result > 9) {
            const sum = String(result).split('').map(Number).reduce((a,b) => a + b, 0);
            steps.push(sum);
            result = sum;
        }
        return { final: result, steps };
    }
    
    function decodeCodeToLetters(code) {
        const digits = String(code).replace(/\s/g, '').split('');
        let result = '';
        for (let d of digits) {
            if (d === '0') continue;
            result += MANTRA_DECODE_ALL[d] || '';
        }
        return result;
    }
    
    // ============================================
    // РАСЧЁТ 9-ЗНАЧНОГО КОДА (ИСПРАВЛЕННЫЙ)
    // ============================================
    
    function calculateNineCode(text) {
        const clean = text.toLowerCase().replace(/\s/g, '');
        if (!clean) return null;
        
        // Переводим буквы в цифры
        let digits = '';
        let letterDetails = [];
        let vowels = [];
        let consonants = [];
        
        for (let char of clean) {
            const val = MANTRA_MAP[char];
            if (val !== undefined) {
                digits += val;
                letterDetails.push({letter: char, digit: val});
                if (VOWELS.includes(char)) {
                    vowels.push(char);
                } else {
                    consonants.push(char);
                }
            }
        }
        
        if (digits.length === 0) return null;
        
        // === ПОШАГОВОЕ СВЁРТЫВАНИЕ ===
        let currentDigits = digits.split('').map(Number);
        let allSteps = [];
        let stepIndex = 0;
        
        // Сохраняем начальный ряд
        allSteps.push({
            label: 'Исходный ряд',
            digits: currentDigits.slice(),
            display: currentDigits.join(' ')
        });
        
        // Сворачиваем попарно, пока не получим ровно 9 цифр
        // или пока не останется 3 цифры (как в примере)
        while (currentDigits.length > 9) {
            let nextDigits = [];
            let pairs = [];
            
            for (let i = 0; i < currentDigits.length; i += 2) {
                if (i + 1 < currentDigits.length) {
                    const sum = currentDigits[i] + currentDigits[i + 1];
                    nextDigits.push(sum);
                    pairs.push(`${currentDigits[i]}+${currentDigits[i+1]}=${sum}`);
                } else {
                    // Если остался один элемент — переносим
                    nextDigits.push(currentDigits[i]);
                    pairs.push(`${currentDigits[i]} (перенос)`);
                }
            }
            
            stepIndex++;
            allSteps.push({
                label: `Шаг ${stepIndex}`,
                digits: nextDigits.slice(),
                display: nextDigits.join(' '),
                pairs: pairs
            });
            
            currentDigits = nextDigits;
        }
        
        // Если получилось меньше 9 цифр — добавляем 369 до 9 цифр
        let finalDigits = currentDigits.slice();
        while (finalDigits.length < 9) {
            // Добавляем 3, 6, 9 по очереди
            if (finalDigits.length < 9) finalDigits.push(3);
            if (finalDigits.length < 9) finalDigits.push(6);
            if (finalDigits.length < 9) finalDigits.push(9);
        }
        
        // Если больше 9 — обрезаем до 9
        if (finalDigits.length > 9) {
            finalDigits = finalDigits.slice(0, 9);
        }
        
        allSteps.push({
            label: 'Финальный код',
            digits: finalDigits.slice(),
            display: finalDigits.join(' '),
            note: '✅ 9 цифр готово'
        });
        
        let nineCode = finalDigits.join('');
        
        return {
            nineCode: nineCode,
            steps: allSteps,
            vowels: vowels,
            consonants: consonants,
            originalDigits: digits,
            letterDetails: letterDetails
        };
    }
    
    // ============================================
    // ОСНОВНОЙ РАСЧЁТ
    // ============================================
    
    function calculate() {
        const input = document.getElementById('inputText').value;
        const container = document.getElementById('resultsContainer');
        const errorEl = document.getElementById('errorMessage');
        const letterCountEl = document.getElementById('letterCount');
        const reductionInfoEl = document.getElementById('reductionInfo');
        
        errorEl.classList.remove('show');
        errorEl.textContent = '';
        container.innerHTML = '';
        
        if (!input.trim()) {
            letterCountEl.textContent = 'Символов: 0';
            reductionInfoEl.textContent = 'Свёрнуто: —';
            return;
        }
        
        const cleanInput = input.replace(/\s/g, '');
        const isOnlyDigits = /^[0-9]+$/.test(cleanInput);
        const isLetters = /^[а-яА-ЯёЁ\s]+$/.test(input);
        let textToProcess = input;
        let decodedText = '';
        let isDecoded = false;
        let codeResult = '';
        let nineCodeResult = '';
        
        if (isOnlyDigits) {
            decodedText = decodeCodeToLetters(cleanInput);
            textToProcess = decodedText;
            isDecoded = true;
        }
        
        // ===== ОБЩИЙ РАСЧЁТ (мантра) =====
        let total = 0;
        let validCount = 0;
        let unknownChars = [];
        let digitCount = 0;
        let letterCount = 0;
        let vowelsFound = [];
        let consonantsFound = [];
        let sumString = '';
        
        for (let i = 0; i < textToProcess.length; i++) {
            const char = textToProcess[i];
            if (char === ' ') continue;
            
            if (char >= '0' && char <= '9') {
                const digit = parseInt(char);
                total += digit;
                validCount++;
                digitCount++;
                if (sumString) sumString += '+';
                sumString += digit;
                continue;
            }
            
            const lower = char.toLowerCase();
            const value = MANTRA_MAP[lower];
            if (value !== undefined) {
                total += value;
                validCount++;
                letterCount++;
                if (sumString) sumString += '+';
                sumString += value;
                
                const isVowel = VOWELS.includes(lower);
                if (isVowel) {
                    vowelsFound.push(char);
                } else {
                    consonantsFound.push(char);
                }
                continue;
            }
            
            unknownChars.push(char);
        }
        
        if (validCount === 0) {
            letterCountEl.textContent = 'Символов: 0';
            reductionInfoEl.textContent = 'Свёрнуто: —';
            if (unknownChars.length > 0) {
                errorEl.textContent = `⚠️ Неизвестные символы: ${unknownChars.join(', ')} (пропущены)`;
                errorEl.classList.add('show');
            }
            return;
        }
        
        const reduction = reduceToSingleDigit(total);
        const finalNumber = reduction.final;
        
        let sumDisplay = sumString + ' = ' + total;
        if (reduction.steps.length > 1) {
            sumDisplay += ' → ' + reduction.steps.join(' → ');
        }
        sumDisplay += ' = ' + finalNumber;
        
        // ===== РАСЧЁТ КОДА =====
        let codeCardHtml = '';
        let codeFinal = '';
        if (isOnlyDigits) {
            const digits = cleanInput.split('');
            let codeSum = 0;
            let codeStr = '';
            for (let d of digits) {
                const num = parseInt(d);
                codeSum += num;
                if (codeStr) codeStr += '+';
                codeStr += num;
            }
            const codeReduction = reduceToSingleDigit(codeSum);
            codeFinal = codeReduction.final;
            let codeSumDisplay = codeStr + ' = ' + codeSum;
            if (codeReduction.steps.length > 1) {
                codeSumDisplay += ' → ' + codeReduction.steps.join(' → ');
            }
            codeSumDisplay += ' = ' + codeReduction.final;
            
            codeCardHtml = `
                <div class="result-card code">
                    <div class="card-title">📊 Расчёт кода</div>
                    <div class="code-display">${cleanInput}</div>
                    <div class="card-number">${codeReduction.final}</div>
                    <div class="card-sum">${codeSumDisplay}</div>
                </div>
            `;
        }
        
        // ===== РАСЧЁТ 9-ЗНАЧНОГО КОДА =====
        let nineCardHtml = '';
        let nineCodeFinal = '';
        if (isLetters || !isOnlyDigits) {
            const nineResult = calculateNineCode(input);
            if (nineResult) {
                nineCodeFinal = nineResult.nineCode;
                
                let stepsHtml = '';
                for (let step of nineResult.steps) {
                    let label = step.label;
                    let display = step.display;
                    if (step.note) {
                        stepsHtml += `<div>${label}: ${display} <span style="color:#a0806a;font-size:12px;">${step.note}</span></div>`;
                    } else {
                        stepsHtml += `<div>${label}: ${display}</div>`;
                    }
                    if (step.pairs && step.pairs.length > 0 && step.pairs[0] !== '') {
                        stepsHtml += `<div style="color:#a0806a;font-size:12px;padding-left:20px;">${step.pairs.join(' | ')}</div>`;
                    }
                }
                
                // Подсчёт итоговой цифры 9-значного кода
                const nineDigits = nineCodeFinal.split('').map(Number);
                let nineSum = 0;
                let nineSumStr = '';
                for (let d of nineDigits) {
                    nineSum += d;
                    if (nineSumStr) nineSumStr += '+';
                    nineSumStr += d;
                }
                const nineReduction = reduceToSingleDigit(nineSum);
                const nineFinal = nineReduction.final;
                let nineSumDisplay = nineSumStr + ' = ' + nineSum;
                if (nineReduction.steps.length > 1) {
                    nineSumDisplay += ' → ' + nineReduction.steps.join(' → ');
                }
                nineSumDisplay += ' = ' + nineFinal;
                
                let nineVowels = nineResult.vowels.length > 0 ? nineResult.vowels.join(', ') : '—';
                let nineConsonants = nineResult.consonants.length > 0 ? nineResult.consonants.join(', ') : '—';
                
                // Оцифровка для отображения
                let oцифровка = nineResult.originalDigits || '';
                
                nineCardHtml = `
                    <div class="result-card ninecode">
                        <div class="card-title">🔢 9-значный код</div>
                        <div style="font-size:13px;color:#6a4a6a;margin-bottom:4px;">Оцифровка: ${oцифровка}</div>
                        <div class="code-display" style="font-size:28px;color:#4a2a4a;">${nineCodeFinal}</div>
                        <div class="code-steps">${stepsHtml}</div>
                        <div class="card-number" style="color:#4a2a4a;">${nineFinal}</div>
                        <div class="card-sum" style="border-color:#c8b0c8;">${nineSumDisplay}</div>
                        <div class="letters-info" style="background:#f4eef4;border-color:#d0c0d0;">
                            <span class="label">🔊 Гласные:</span> <span class="vowel">${nineVowels}</span>
                            &nbsp;|&nbsp;
                            <span class="label">🔇 Согласные:</span> <span class="consonant">${nineConsonants}</span>
                        </div>
                    </div>
                `;
            }
        }
        
        // ===== МАНТРА =====
        let lettersHtml = '';
        if (vowelsFound.length > 0 || consonantsFound.length > 0) {
            let infoHtml = '';
            if (vowelsFound.length > 0) {
                infoHtml += `<span class="label">🔊 Гласные:</span> <span class="vowel">${vowelsFound.join(', ')}</span>`;
                if (consonantsFound.length > 0) infoHtml += ' &nbsp;|&nbsp; ';
            }
            if (consonantsFound.length > 0) {
                infoHtml += `<span class="label">🔇 Согласные:</span> <span class="consonant">${consonantsFound.join(', ')}</span>`;
            }
            lettersHtml = `<div class="letters-info">${infoHtml}</div>`;
        }
        
        let mantraSoundRow = isDecoded ? decodedText : textToProcess;
        let oцифровка = '';
        if (isDecoded) {
            for (let char of decodedText) {
                const lower = char.toLowerCase();
                const val = MANTRA_MAP[lower];
                if (val !== undefined) {
                    oцифровка += val;
                }
            }
        }
        
        const mantraCardHtml = `
            <div class="result-card mantra">
                <div class="card-title">🔮 Мантра</div>
                <div class="sound-row">${mantraSoundRow}</div>
                ${oцифровка ? `<div class="digit-row">${oцифровка}</div>` : ''}
                <div class="card-number">${finalNumber}</div>
                <div class="card-sum">${sumDisplay}</div>
                ${lettersHtml}
            </div>
        `;
        
        // ===== СБОРКА =====
        let gridHtml = '';
        if (isOnlyDigits) {
            gridHtml = `<div class="results-grid">${codeCardHtml}${mantraCardHtml}</div>`;
        } else if (isLetters || !isOnlyDigits) {
            gridHtml = `<div class="results-grid" style="grid-template-columns:1fr 1fr;">${nineCardHtml}${mantraCardHtml}</div>`;
        } else {
            gridHtml = `<div class="results-grid" style="grid-template-columns:1fr;">${mantraCardHtml}</div>`;
        }
        
        container.innerHTML = gridHtml;
        
        const resultDisplay = isOnlyDigits ? `${codeFinal} / ${finalNumber}` : `${finalNumber}`;
        addHistoryEntry(input.trim(), resultDisplay, mantraSoundRow, codeFinal, nineCodeFinal);
        
        let stats = [];
        if (letterCount > 0) stats.push(`букв: ${letterCount}`);
        if (digitCount > 0) stats.push(`цифр: ${digitCount}`);
        letterCountEl.textContent = `Символов: ${validCount} (${stats.join(', ')})`;
        
        const stepsStr = reduction.steps.length > 1 ? reduction.steps.join('→') : `${total} (1 шаг)`;
        reductionInfoEl.textContent = `Свёрнуто: ${total} → ${stepsStr} → ${finalNumber}`;
        
        if (unknownChars.length > 0) {
            const show = unknownChars.slice(0, 10).join(', ');
            const more = unknownChars.length > 10 ? ` и ещё ${unknownChars.length - 10}` : '';
            errorEl.textContent = `⚠️ Пропущены: ${show}${more} (неизвестные символы)`;
            errorEl.classList.add('show');
        }
        
        const isLocal = window.location.protocol === 'file:';
        if (!isLocal) {
            document.getElementById('shareButtons').style.display = 'flex';
        }
        
        document.getElementById('historyCount').textContent = history.length;
    }
    
    // ============================================
    // ДЕКОДИРОВАТЬ КОД
    // ============================================
    
    function decodeCode() {
        const input = document.getElementById('inputText').value;
        const cleanInput = input.replace(/\s/g, '');
        
        if (!/^[0-9]+$/.test(cleanInput)) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = '⚠️ Введите только цифры для декодирования!';
            errorEl.classList.add('show');
            return;
        }
        
        const decoded = decodeCodeToLetters(cleanInput);
        document.getElementById('inputText').value = decoded;
        calculate();
    }
    
    function clearAll() {
        document.getElementById('inputText').value = '';
        document.getElementById('resultsContainer').innerHTML = '';
        document.getElementById('letterCount').textContent = 'Символов: 0';
        document.getElementById('reductionInfo').textContent = 'Свёрнуто: —';
        const errorEl = document.getElementById('errorMessage');
        errorEl.classList.remove('show');
        errorEl.textContent = '';
    }
    
    // ============================================
    // ШЕРИНГ
    // ============================================
    
    function getShareUrl() {
        if (window.location.protocol !== 'file:') {
            return window.location.href;
        }
        return 'https://santaria369.github.io/chaynik-calculator/';
    }
    
    function shareTelegram() {
        const url = getShareUrl();
        const text = encodeURIComponent('🫖 Сантария | Чайник-калькулятор — перевожу код в звуки и 9-значный код!');
        window.open(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=${text}`, '_blank');
    }
    
    function shareWhatsApp() {
        const url = getShareUrl();
        const text = encodeURIComponent('🫖 Сантария | Чайник-калькулятор — узнайте свой 9-значный код!');
        window.open(`https://api.whatsapp.com/send?text=${text}%20${encodeURIComponent(url)}`, '_blank');
    }
    
    function shareVK() {
        const url = getShareUrl();
        window.open(`https://vk.com/share.php?url=${encodeURIComponent(url)}&title=🫖 Сантария | Чайник-калькулятор`, '_blank');
    }
    
    function copyLink() {
        const url = getShareUrl();
        navigator.clipboard.writeText(url).then(() => {
            alert('✅ Ссылка скопирована! Можно отправлять друзьям 🫖');
        }).catch(() => {
            const input = document.createElement('input');
            input.value = url;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            alert('✅ Ссылка скопирована! Можно отправлять друзьям 🫖');
        });
    }
    
    // ============================================
    // ЗАПУСК
    // ============================================
    
    window.onload = function() {
        updateTable();
        loadHistory();
        setTimeout(calculate, 150);
        if (window.location.protocol !== 'file:') {
            document.getElementById('shareButtons').style.display = 'flex';
        }
    };
    
    let timer;
    document.getElementById('inputText').addEventListener('input', function() {
        clearTimeout(timer);
        timer = setTimeout(calculate, 600);
    });
    
    document.getElementById('inputText').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            calculate();
        }
    });
</script>
</body>
</html>
