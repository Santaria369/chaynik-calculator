<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🫖 Чайник-калькулятор</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#fdf6ed,#f0e6d8);min-height:100vh;padding:20px;display:flex;justify-content:center;align-items:flex-start}
        .container{max-width:700px;width:100%;background:#fffdf9;border-radius:32px;padding:32px;box-shadow:0 20px 60px rgba(120,80,40,0.15);margin-top:20px;border:1px solid #f0e4d4}
        .header{display:flex;align-items:center;gap:14px;margin-bottom:4px}
        .header .kettle{font-size:44px;line-height:1}
        .header h1{font-size:30px;color:#5a3e2b;font-weight:800;letter-spacing:-0.5px}
        .header h1 span{color:#b8863a}
        .subtitle{color:#8b7355;font-size:15px;margin-bottom:22px;padding-bottom:16px;border-bottom:2px dashed #e8dccc;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
        .subtitle .emoji{font-size:20px}
        .mode-selector{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
        .mode-btn{flex:1;min-width:130px;padding:13px 16px;border:2px solid #e8dccc;border-radius:16px;background:#fffcf8;cursor:pointer;font-weight:600;font-size:15px;color:#6b5340;transition:all .3s;text-align:center}
        .mode-btn:hover{border-color:#c4a88a;background:#fff6ed}
        .mode-btn.active{border-color:#b8863a;background:#fcf3e8;color:#5a3e2b;box-shadow:0 0 0 3px rgba(184,134,58,0.15)}
        .mode-btn .badge{display:block;font-size:11px;font-weight:400;color:#a0806a;margin-top:3px}
        textarea{width:100%;height:120px;padding:16px 18px;font-size:20px;border:2px solid #e8dccc;border-radius:18px;font-family:inherit;resize:vertical;transition:.3s;background:#fdfaf6}
        textarea:focus{border-color:#b8863a;outline:none;box-shadow:0 0 0 4px rgba(184,134,58,0.1);background:#fffcf8}
        textarea::placeholder{color:#bba28c}
        .btn-group{display:flex;gap:12px;margin:16px 0 20px;flex-wrap:wrap}
        .btn-group button{flex:1;min-width:100px;padding:14px 18px;border:none;border-radius:40px;font-size:17px;font-weight:600;cursor:pointer;transition:.2s}
        .btn-calc{background:#b8863a;color:#fff;box-shadow:0 4px 15px rgba(184,134,58,0.3)}
        .btn-calc:hover{background:#9e6f2e;transform:scale(1.02)}
        .btn-clear{background:#e8dccc;color:#5a3e2b}
        .btn-clear:hover{background:#dccfc0}
        .btn-decode{background:#6b8a6b;color:#fff;box-shadow:0 4px 15px rgba(80,120,80,0.3)}
        .btn-decode:hover{background:#4a6a4a;transform:scale(1.02)}
        .result-box{background:#fcf6ee;border-radius:20px;padding:20px;text-align:center;border:1px solid #e8dccc;margin-bottom:16px}
        .result-number{font-size:60px;font-weight:800;color:#4a3222;line-height:1.2}
        .result-number .secondary{font-size:24px;font-weight:400;color:#a0806a}
        .result-label{font-size:13px;color:#8b7355;margin-top:2px;letter-spacing:0.5px}
        .result-sum{font-size:15px;color:#5a3e2b;background:#fffcf8;padding:6px 18px;border-radius:40px;display:inline-block;margin-top:6px;border:1px solid #e8dccc}
        .interpretation{margin-top:10px;padding:12px 16px;background:#fcf3e8;border-radius:14px;font-size:15px;color:#5a3e2b;border-left:4px solid #b8863a;text-align:left;display:none}
        .error{color:#b34a3a;font-size:14px;padding:8px 16px;background:#fde8e0;border-radius:30px;display:none;margin-top:8px}
        .error.show{display:inline-block}
        .info-row{display:flex;justify-content:space-between;font-size:13px;color:#8b7355;margin:10px 0 4px;flex-wrap:wrap;gap:6px}
        .badge{background:#f5ede4;padding:3px 16px;border-radius:30px}
        .table-ref{margin-top:16px;padding:14px 16px;background:#fdfaf6;border-radius:14px;border:1px solid #e8dccc;font-size:13px;line-height:1.8}
        .table-ref strong{color:#5a3e2b}
        .table-ref .num{color:#b8863a;font-weight:700}
        .table-ref .note{color:#a0806a;font-size:12px;font-style:italic}
        .footer{margin-top:20px;text-align:center;font-size:13px;color:#a0806a;border-top:1px solid #e8dccc;padding-top:16px}
        .share-buttons{margin:12px 0 6px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
        .share-btn{padding:8px 18px;border-radius:30px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:.2s;color:#fff;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
        .share-btn:hover{transform:scale(1.05);opacity:0.9}
        .share-telegram{background:#0088cc}
        .share-whatsapp{background:#25d366}
        .share-vk{background:#0077ff}
        .share-copy{background:#8b7355}
        .letters-info{background:#fcf3e8;border-radius:14px;padding:12px 16px;margin-top:8px;border:1px solid #e8dccc;font-size:14px;display:none;text-align:left}
        .letters-info .vowel{color:#b34a3a;font-weight:700}
        .letters-info .consonant{color:#2a3a6a;font-weight:700}
        .letters-info .label{color:#8b7355;font-size:13px}
        .letters-info .sub{color:#8b7355;font-size:12px;margin-left:6px}
        .decoded-block{background:#f8f4ee;border-radius:12px;padding:12px 16px;margin:8px 0;border:1px solid #e8dccc;font-size:16px;font-weight:600;color:#5a3e2b;text-align:center}
        .decoded-block .label{font-weight:400;color:#8b7355;font-size:13px}
        @media(max-width:480px){.container{padding:18px}.result-number{font-size:44px}.mode-btn{min-width:100px;font-size:13px;padding:10px 12px}.header h1{font-size:24px}}
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="kettle">🫖</div>
        <h1>Чайник-<span>калькулятор</span></h1>
    </div>
    <div class="subtitle">
        <span class="emoji">📖</span> Код → буквы → цифры → одно число
        <span style="margin-left:auto;font-size:13px;color:#bba28c;">☕ для чайников</span>
    </div>
    
    <div class="mode-selector">
        <button class="mode-btn active" data-mode="mantra" onclick="setMode('mantra')">
            🔮 Мантры
            <span class="badge">а,и,с,ъ=1 ... з,р,щ=9</span>
        </button>
    </div>
    
    <textarea id="inputText" placeholder="Введите код или мантру...&#10;Например: 3691408358">3691408358</textarea>
    
    <div class="btn-group">
        <button class="btn-calc" onclick="calculate()">🧮 Заварить!</button>
        <button class="btn-decode" onclick="decodeCode()">🔀 Код → буквы</button>
        <button class="btn-clear" onclick="clearAll()">✕ Очистить</button>
    </div>
    
    <div class="result-box">
        <div class="result-number" id="resultNumber"><span class="secondary">—</span></div>
        <div class="result-label" id="resultLabel">ЦИФРА МАНТРЫ</div>
        <div class="result-sum" id="originalSum">Сумма: —</div>
        <div class="interpretation" id="interpretation"></div>
        <div class="letters-info" id="lettersInfo"></div>
    </div>
    
    <div class="error" id="errorMessage"></div>
    
    <div class="info-row">
        <span class="badge" id="letterCount">Символов: 0</span>
        <span class="badge" id="reductionInfo">Свёрнуто: —</span>
        <span class="badge">🫖 чайник-калькулятор</span>
    </div>
    
    <div class="table-ref" id="tableRef">
        <strong>📖 Соответствие букв и чисел (мантры):</strong>
        <div id="tableContent"></div>
        <div class="note">* Ь — гласная, Ъ — согласная</div>
    </div>
    
    <div class="share-buttons" id="shareButtons" style="display:none;">
        <button class="share-btn share-telegram" onclick="shareTelegram()">📱 Telegram</button>
        <button class="share-btn share-whatsapp" onclick="shareWhatsApp()">💬 WhatsApp</button>
        <button class="share-btn share-vk" onclick="shareVK()">🌐 ВКонтакте</button>
        <button class="share-btn share-copy" onclick="copyLink()">📋 Копировать ссылку</button>
    </div>
    
    <div class="footer">
        ☕ Всё просто: код → буквы → цифры → одно число (1-9)
    </div>
</div>

<script>
    // ============================================
    // СЛОВАРИ
    // ============================================
    
    // Мантры: а,и,с,ъ=1; б,й,т,ы=2; и т.д.
    const MANTRA_MAP = {
        'а':1,'и':1,'с':1,'ъ':1,
        'б':2,'й':2,'т':2,'ы':2,
        'в':3,'к':3,'у':3,'ь':3,
        'г':4,'л':4,'ф':4,'э':4,
        'д':5,'м':5,'х':5,'ю':5,
        'е':6,'н':6,'ц':6,'я':6,
        'ё':7,'о':7,'ч':7,
        'ж':8,'п':8,'ш':8,
        'з':9,'р':9,'щ':9
    };
    
    // ОБРАТНЫЙ словарь для перевода цифр в буквы (мантры)
    const MANTRA_DECODE = {
        '1': ['а', 'и', 'с', 'ъ'],
        '2': ['б', 'й', 'т', 'ы'],
        '3': ['в', 'к', 'у', 'ь'],
        '4': ['г', 'л', 'ф', 'э'],
        '5': ['д', 'м', 'х', 'ю'],
        '6': ['е', 'н', 'ц', 'я'],
        '7': ['ё', 'о', 'ч'],
        '8': ['ж', 'п', 'ш'],
        '9': ['з', 'р', 'щ'],
        '0': ['0']
    };
    
    // Гласные: а, и, у, э, о, ы, е, ё, ю, я + ь (мягкий знак)
    const VOWELS = ['а', 'и', 'у', 'э', 'о', 'ы', 'е', 'ё', 'ю', 'я', 'ь'];
    
    const TABLES = {
        mantra: [
            '1: а, и, с, ъ',
            '2: б, й, т, ы',
            '3: в, к, у, ь',
            '4: г, л, ф, э',
            '5: д, м, х, ю',
            '6: е, н, ц, я',
            '7: ё, о, ч',
            '8: ж, п, ш',
            '9: з, р, щ'
        ]
    };
    
    const INTERPRETATIONS = {
        1:'🌟 Единство, начало, лидерство',
        2:'🤝 Гармония, партнёрство, баланс',
        3:'🎨 Творчество, общение, радость',
        4:'🏛️ Стабильность, порядок, труд',
        5:'🦋 Свобода, перемены, приключения',
        6:'💖 Любовь, ответственность, семья',
        7:'🔮 Мудрость, духовность, интуиция',
        8:'⚡ Успех, власть, трансформация',
        9:'🌍 Завершение, гуманизм, мудрость'
    };
    
    // ============================================
    // СОСТОЯНИЕ
    // ============================================
    let currentMode = 'mantra';
    
    // ============================================
    // ФУНКЦИИ
    // ============================================
    
    function getMap() {
        return MANTRA_MAP;
    }
    
    function getModeName() {
        return 'Мантры';
    }
    
    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.mode === mode);
        });
        updateTable();
        const input = document.getElementById('inputText').value;
        if (input.trim()) calculate();
    }
    
    function updateTable() {
        const container = document.getElementById('tableContent');
        container.innerHTML = TABLES.mantra.map(row => `<div>${row}</div>`).join('');
    }
    
    function reduceToSingleDigit(num) {
        if (num === 0) return { final: 0, steps: [0] };
        let result = num;
        const steps = [num];
        while (result > 9) {
            const sum = String(result).split('').map(Number).reduce((a,b) => a + b, 0);
            steps.push(sum);
            result = sum;
        }
        return { final: result, steps };
    }
    
    // ============================================
    // ДЕКОДИНГ КОДА → БУКВЫ (мантры)
    // ============================================
    
    function decodeCodeToLetters(code) {
        const digits = String(code).replace(/\s/g, '').split('');
        let result = '';
        let position = 0;
        
        for (let d of digits) {
            if (d === '0') {
                result += '0';
                position++;
                continue;
            }
            const letters = MANTRA_DECODE[d] || ['?'];
            const letter = letters[position % letters.length];
            result += letter;
            position++;
        }
        return result;
    }
    
    // ============================================
    // ОСНОВНОЙ РАСЧЁТ
    // ============================================
    
    function calculate() {
        const input = document.getElementById('inputText').value;
        const resultNumberEl = document.getElementById('resultNumber');
        const errorEl = document.getElementById('errorMessage');
        const originalSumEl = document.getElementById('originalSum');
        const letterCountEl = document.getElementById('letterCount');
        const reductionInfoEl = document.getElementById('reductionInfo');
        const interpretationEl = document.getElementById('interpretation');
        const resultLabel = document.getElementById('resultLabel');
        const lettersInfoEl = document.getElementById('lettersInfo');
        
        errorEl.classList.remove('show');
        errorEl.textContent = '';
        interpretationEl.style.display = 'none';
        lettersInfoEl.style.display = 'none';
        
        if (!input.trim()) {
            resultNumberEl.innerHTML = `<span class="secondary">—</span>`;
            originalSumEl.textContent = 'Сумма: —';
            letterCountEl.textContent = 'Символов: 0';
            reductionInfoEl.textContent = 'Свёрнуто: —';
            resultLabel.textContent = 'ЦИФРА МАНТРЫ';
            return;
        }
        
        const map = getMap();
        let total = 0;
        let validCount = 0;
        let unknownChars = [];
        let digitCount = 0;
        let letterCount = 0;
        let vowelsFound = [];
        let consonantsFound = [];
        let decodedText = '';
        let isDecoded = false;
        
        // Проверяем: если ввод — только цифры, декодируем в буквы
        const isOnlyDigits = /^[0-9\s]+$/.test(input.trim());
        let textToProcess = input;
        
        if (isOnlyDigits && currentMode === 'mantra') {
            const cleanDigits = input.replace(/\s/g, '');
            decodedText = decodeCodeToLetters(cleanDigits);
            textToProcess = decodedText;
            isDecoded = true;
        }
        
        // Обрабатываем каждый символ
        for (let i = 0; i < textToProcess.length; i++) {
            const char = textToProcess[i];
            
            // Пропускаем пробелы
            if (char === ' ') {
                continue;
            }
            
            // Проверяем: это цифра?
            if (char >= '0' && char <= '9') {
                const digit = parseInt(char);
                total += digit;
                validCount++;
                digitCount++;
                continue;
            }
            
            // Проверяем: это буква из нашего алфавита?
            const lower = char.toLowerCase();
            const value = map[lower];
            if (value !== undefined) {
                total += value;
                validCount++;
                letterCount++;
                
                // Проверяем, гласная или согласная
                const isVowel = VOWELS.includes(lower);
                if (isVowel) {
                    vowelsFound.push(char);
                } else {
                    consonantsFound.push(char);
                }
                continue;
            }
            
            // Всё остальное - пропускаем
            unknownChars.push(char);
        }
        
        // Если нет валидных символов
        if (validCount === 0) {
            resultNumberEl.innerHTML = `<span class="secondary">0</span>`;
            originalSumEl.textContent = 'Сумма: 0';
            letterCountEl.textContent = 'Символов: 0';
            reductionInfoEl.textContent = 'Свёрнуто: —';
            resultLabel.textContent = 'ЦИФРА МАНТРЫ';
            if (unknownChars.length > 0) {
                errorEl.textContent = `⚠️ Неизвестные символы: ${unknownChars.join(', ')} (пропущены)`;
                errorEl.classList.add('show');
            }
            return;
        }
        
        const reduction = reduceToSingleDigit(total);
        const finalNumber = reduction.final;
        
        resultNumberEl.innerHTML = `${finalNumber}`;
        resultLabel.textContent = `ЦИФРА МАНТРЫ`;
        originalSumEl.textContent = `Сумма: ${total}`;
        
        if (finalNumber >= 1 && finalNumber <= 9) {
            interpretationEl.textContent = INTERPRETATIONS[finalNumber] || '';
            interpretationEl.style.display = 'block';
        }
        
        // ============================================
        // ИНФОРМАЦИЯ О ГЛАСНЫХ И СОГЛАСНЫХ
        // ============================================
        if (vowelsFound.length > 0 || consonantsFound.length > 0) {
            let infoHtml = '';
            
            if (vowelsFound.length > 0) {
                infoHtml += `
                    <div style="margin-bottom:4px;">
                        <span class="label">🔊 Гласные:</span>
                        <span class="vowel">${vowelsFound.join(', ')}</span>
                    </div>
                `;
            }
            
            if (consonantsFound.length > 0) {
                infoHtml += `
                    <div>
                        <span class="label">🔇 Согласные:</span>
                        <span class="consonant">${consonantsFound.join(', ')}</span>
                    </div>
                `;
            }
            
            lettersInfoEl.innerHTML = infoHtml;
            lettersInfoEl.style.display = 'block';
        }
        
        // ============================================
        // ДЕКОДИРОВАННЫЙ ТЕКСТ (если был код)
        // ============================================
        if (isDecoded && decodedText) {
            // Вставляем декодированный текст перед результатом
            const decodedBlock = document.createElement('div');
            decodedBlock.className = 'decoded-block';
            decodedBlock.innerHTML = `<span class="label">🔀 Декодировано:</span> ${decodedText}`;
            
            // Вставляем после поля ввода, перед результатом
            const resultBox = document.querySelector('.result-box');
            const existing = document.querySelector('.decoded-block');
            if (existing) existing.remove();
            resultBox.parentNode.insertBefore(decodedBlock, resultBox);
        } else {
            const existing = document.querySelector('.decoded-block');
            if (existing) existing.remove();
        }
        
        // Инфо
        let stats = [];
        if (letterCount > 0) stats.push(`букв: ${letterCount}`);
        if (digitCount > 0) stats.push(`цифр: ${digitCount}`);
        letterCountEl.textContent = `Символов: ${validCount} (${stats.join(', ')})`;
        
        const stepsStr = reduction.steps.length > 1 ? reduction.steps.join('→') : `${total} (1 шаг)`;
        reductionInfoEl.textContent = `Свёрнуто: ${total} → ${stepsStr} → ${finalNumber}`;
        
        if (unknownChars.length > 0) {
            const show = unknownChars.slice(0, 10).join(', ');
            const more = unknownChars.length > 10 ? ` и ещё ${unknownChars.length - 10}` : '';
            errorEl.textContent = `⚠️ Пропущены: ${show}${more} (неизвестные символы)`;
            errorEl.classList.add('show');
        }
        
        const isLocal = window.location.protocol === 'file:';
        if (!isLocal) {
            document.getElementById('shareButtons').style.display = 'flex';
        }
    }
    
    // ============================================
    // ДЕКОДИРОВАТЬ КОД
    // ============================================
    
    function decodeCode() {
        const input = document.getElementById('inputText').value;
        const cleanInput = input.replace(/\s/g, '');
        
        if (!/^[0-9]+$/.test(cleanInput)) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = '⚠️ Введите только цифры для декодирования!';
            errorEl.classList.add('show');
            return;
        }
        
        const decoded = decodeCodeToLetters(cleanInput);
        document.getElementById('inputText').value = decoded;
        calculate();
    }
    
    function clearAll() {
        document.getElementById('inputText').value = '';
        document.getElementById('resultNumber').innerHTML = `<span class="secondary">—</span>`;
        document.getElementById('originalSum').textContent = 'Сумма: —';
        document.getElementById('letterCount').textContent = 'Символов: 0';
        document.getElementById('reductionInfo').textContent = 'Свёрнуто: —';
        document.getElementById('resultLabel').textContent = 'ЦИФРА МАНТРЫ';
        document.getElementById('interpretation').style.display = 'none';
        document.getElementById('lettersInfo').style.display = 'none';
        const errorEl = document.getElementById('errorMessage');
        errorEl.classList.remove('show');
        errorEl.textContent = '';
        const existing = document.querySelector('.decoded-block');
        if (existing) existing.remove();
    }
    
    // ============================================
    // ШЕРИНГ
    // ============================================
    
    function getShareUrl() {
        if (window.location.protocol !== 'file:') {
            return window.location.href;
        }
        return 'https://ваш-сайт.com/chaynik-calculator.html';
    }
    
    function shareTelegram() {
        const url = getShareUrl();
        const text = encodeURIComponent('🫖 Чайник-калькулятор — перевожу код в буквы и обратно!');
        window.open(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=${text}`, '_blank');
    }
    
    function shareWhatsApp() {
        const url = getShareUrl();
        const text = encodeURIComponent('🫖 Чайник-калькулятор — узнайте своё число!');
        window.open(`https://api.whatsapp.com/send?text=${text}%20${encodeURIComponent(url)}`, '_blank');
    }
    
    function shareVK() {
        const url = getShareUrl();
        window.open(`https://vk.com/share.php?url=${encodeURIComponent(url)}&title=🫖 Чайник-калькулятор`, '_blank');
    }
    
    function copyLink() {
        const url = getShareUrl();
        navigator.clipboard.writeText(url).then(() => {
            alert('✅ Ссылка скопирована! Можно отправлять друзьям 🫖');
        }).catch(() => {
            const input = document.createElement('input');
            input.value = url;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            alert('✅ Ссылка скопирована! Можно отправлять друзьям 🫖');
        });
    }
    
    // ============================================
    // ЗАПУСК
    // ============================================
    
    window.onload = function() {
        currentMode = 'mantra';
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.mode === 'mantra');
        });
        updateTable();
        setTimeout(calculate, 150);
        if (window.location.protocol !== 'file:') {
            document.getElementById('shareButtons').style.display = 'flex';
        }
    };
    
    let timer;
    document.getElementById('inputText').addEventListener('input', function() {
        clearTimeout(timer);
        timer = setTimeout(calculate, 600);
    });
    
    document.getElementById('inputText').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            calculate();
        }
    });
</script>
</body>
</html>
